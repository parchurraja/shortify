spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/shortify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Raja@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.shortify: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
